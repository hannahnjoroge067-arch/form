<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aliferous Revival Hub</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:linear-gradient(135deg, #ffffff, #e0f7ff, #ffd6ec);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:600px;
      background:white;
      border-radius:25px;
      padding:40px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
      text-align:center;
    }

    h1{
      color:#ff4fa3;
      font-size:40px;
      margin-bottom:15px;
    }

    .subtitle{
      color:#38bdf8;
      font-size:18px;
      margin-bottom:35px;
    }

    form{
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    input,
    textarea{
      width:100%;
      padding:15px;
      border:2px solid #dbeafe;
      border-radius:12px;
      font-size:16px;
      outline:none;
      transition:0.3s;
    }

    input:focus,
    textarea:focus{
      border-color:#38bdf8;
      box-shadow:0 0 10px rgba(56,189,248,0.3);
    }

    textarea{
      min-height:150px;
      resize:none;
    }

    button{
      background:linear-gradient(90deg, #ff4fa3, #38bdf8);
      color:white;
      border:none;
      padding:15px;
      border-radius:12px;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
    }

    button:hover{
      transform:scale(1.03);
    }

    .footer{
      margin-top:25px;
      color:#94a3b8;
      font-size:14px;
    }

    @media(max-width:600px){

      .container{
        padding:30px 20px;
      }

      h1{
        font-size:32px;
      }

    }

  </style>

</head>
<body>

  <div class="container">

    <h1>Aliferous Revival Hub</h1>

    <p class="subtitle">
      Join us and become part of a growing community.
    </p>

    <form action="https://formsubmit.co/YOUR-EMAIL@gmail.com" method="POST">

      <!-- CEO EMAIL -->
      <input type="hidden" name="_cc" value="CEO-EMAIL@gmail.com">

      <!-- Disable Captcha -->
      <input type="hidden" name="_captcha" value="false">

      <!-- Email Subject -->
      <input type="hidden" name="_subject" value="New Message From Aliferous Revival Hub">

      <!-- After Submit -->
      <input type="hidden" name="_next" value="https://yourusername.github.io/thanks.html">

      <input type="text" name="name" placeholder="Name :" required>

      <input type="email" name="email" placeholder="Email :" required>

      <input type="tel" name="phone" placeholder="Phone number :" required>

      <textarea name="message" placeholder="Your message :)"></textarea>

      <button type="submit">Send Message</button>

    </form>

    <div class="footer">
      © 2026 Aliferous Revival Hub
    </div>

  </div>

</body>
</html>
